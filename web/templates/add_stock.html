<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYONDO Hardware - Add Stock</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #f0f2f5;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* Container */
      .container {
        max-width: 800px;
        width: 50%;
        margin: 0 auto;
      }

      /* Card */
      .add-card {
        background: white;
        border-radius: 24px;
        padding: 35px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        transition: transform 0.3s ease;
      }

      .add-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
      }

      /* Header */
      .card-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .card-header h2 {
        font-size: 28px;
        font-weight: 700;
        color: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .card-header h2 i {
        color: #ff8c00;
        font-size: 28px;
      }

      .card-header p {
        color: #666;
        font-size: 14px;
        margin-top: 8px;
      }

      /* Form Styles */
      .stock-form {
        display: flex;
        flex-direction: column;
      }

      /* Two Column Grid */
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      .form-group-full {
        grid-column: span 2;
      }

      .form-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #1a1a2e;
        font-size: 14px;
      }

      .form-group label i {
        color: #ff8c00;
        width: 18px;
      }

      .required {
        color: #f44336;
        font-size: 12px;
        margin-left: 4px;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        transition: all 0.3s;
        background: white;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #ff8c00;
        box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
      }

      /* Checkbox Group Styles */
      .checkbox-group {
        flex-direction: row;
        align-items: center;
        gap: 12px;
      }

      .checkbox-group label {
        margin-bottom: 0;
        cursor: pointer;
      }

      .checkbox-group input[type="checkbox"] {
        width: auto;
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #ff8c00;
        margin: 0;
      }

      /* HTML5 Validation Styles */
      .form-group input:invalid:focus,
      .form-group select:invalid:focus {
        border-color: #f44336;
      }

      /* Profit Preview */
      .profit-preview {
        margin-top: 15px;
        margin-bottom: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 12px;
      }

      .profit-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .profit-info span {
        font-size: 14px;
        color: #666;
      }

      .profit-info strong {
        color: #4caf50;
        font-size: 16px;
      }

      /* Button */
      .btn-save {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #ffd700, #ff8c00);
        border: none;
        border-radius: 12px;
        color: #1a1a2e;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-family: "Inter", sans-serif;
        margin-top: 10px;
      }

      .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
      }

      /* Back Link */
      .back-link {
        text-align: center;
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #e5e7eb;
      }

      .back-link a {
        text-decoration: none;
        color: #ff8c00;
        font-weight: 500;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s;
      }

      .back-link a:hover {
        gap: 12px;
        color: #e67e22;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .add-card {
          padding: 25px;
        }

        .card-header h2 {
          font-size: 24px;
        }

        .form-row {
          grid-template-columns: 1fr;
          gap: 15px;
        }

        .form-group-full {
          grid-column: span 1;
        }

        .profit-info {
          flex-direction: column;
          text-align: center;
        }

        .checkbox-group {
          flex-direction: row;
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="add-card">
        <div class="card-header">
          <h2><i class="fas fa-plus-circle"></i> Add New Stock</h2>
          <p>
            <i class="fas fa-boxes"></i> Receive new inventory from suppliers
          </p>
        </div>

        <form method="POST" class="stock-form" action="{% url 'add_stock' %}">
          {% csrf_token %}

          <!-- Row 1: Product Name + Quantity -->
          <div class="form-row">
            <div class="form-group">
              <label>
                <i class="fas fa-tag"></i> Product Name
                <span class="required">*</span>
              </label>
              <select name="product_name" required>
                <option value="">-- Select Product --</option>
                <option value="Cement - CEM II N">Cement - CEM II N</option>
                <option value="Cement - CEM III N">Cement - CEM III N</option>
                <option value="Iron Bar - 10mm">Iron Bar - 10mm</option>
                <option value="Iron Bar - 12mm">Iron Bar - 12mm</option>
                <option value="Iron Bar - 16mm">Iron Bar - 16mm</option>
                <option value="Nails - 1 inch">Nails - 1 inch</option>
                <option value="Nails - 3 inch">Nails - 3 inch</option>
                <option value="Nails - 4 inch">Nails - 4 inch</option>
                <option value="Nails - 5 inch">Nails - 5 inch</option>
                <option value="Roofing Nails">Roofing Nails</option>
                <option value="Wheelbarrow">Wheelbarrow</option>
                <option value="Wire Mesh">Wire Mesh</option>
                <option value="Barbed Wire - High Tensile">
                  Barbed Wire - High Tensile
                </option>
                <option value="Barbed Wire - Low Tensile">
                  Barbed Wire - Low Tensile
                </option>
                <option value="Iron Sheets - Green">Iron Sheets - Green</option>
                <option value="Iron Sheets - Blue">Iron Sheets - Blue</option>
                <option value="Iron Sheets - Red">Iron Sheets - Red</option>
                <option value="Iron Sheets - White">Iron Sheets - White</option>
              </select>
            </div>

            <div class="form-group">
              <label>
                <i class="fas fa-cubes"></i> Quantity
                <span class="required">*</span>
              </label>
              <input
                type="number"
                name="quantity"
                min="1"
                step="1"
                placeholder="Enter quantity"
                required
              />
            </div>
          </div>

          <!-- Row 2: Unit Price + Selling Price -->
          <div class="form-row">
            <div class="form-group">
              <label>
                <i class="fas fa-dollar-sign"></i> Unit Cost (UGX)
                <span class="required">*</span>
              </label>
              <input
                type="number"
                name="unit_cost"
                min="1"
                step="0.01"
                placeholder="Cost from supplier"
                required
              />
            </div>

            <div class="form-group">
              <label>
                <i class="fas fa-tag"></i> Selling Price (UGX)
                <span class="required">*</span>
              </label>
              <input
                type="number"
                name="selling_price"
                min="1"
                step="0.01"
                placeholder="Price to customers"
                required
              />
            </div>

            <div class="form-group">
              <label><i class="fas fa-tag"></i> Category</label>
              <select name="category" class="form-control" required>
                <option value=""> --select category--</option>    
                <option value="cement">Cement</option>
                <option value="steel">Steel</option>
                <option value="nails">Nails</option>
                <option value="hardware">Hardware</option>
                <option value="roofing">Roofing</option>
              </select>
            </div>
          </div>

          <div class="profit-preview">
            <div class="profit-info">
              <span><i class="fas fa-chart-line"></i> Note:</span>
              <span>Profit will be calculated automatically after saving</span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>
                <i class="fas fa-building"></i> Supplier
                <span class="required">*</span>
              </label>
              <select name="supplier" required>
                <option value="">-- Select Supplier --</option>
    {% for supplier in suppliers %}
        <option value="{{ supplier.id }}">{{ supplier.name }}</option>
    {% endfor %}
              </select>
            </div>

            <div class="form-group">
              <label>
                <i class="fas fa-credit-card"></i> Payment Method
                <span class="required">*</span>
              </label>
              <select name="payment_method" required>
                <option value="">-- Select Payment Method --</option>
                <option value="cash">💰 Cash</option>
                <option value="bank_transfer">🏦 Bank Transfer</option>
                <option value="credit">📝 Credit (Pay Later)</option>
                <option value="cheque">📄 Cheque</option>
                <option value="mobile_money">📱 Mobile Money</option>
              </select>
            </div>
          </div>

      
          <div class="form-row">
            <div class="form-group checkbox-group">
              <input type="checkbox" name="is_paid" id="is_paid" />
              <label for="is_paid">
                <i class="fas fa-check-circle"></i> Is Paid
              </label>
              <small style="margin-left: 8px; color: #666; font-size: 12px;">
                (Check if payment has been completed)
              </small>
            </div>
          </div>


          <div class="form-row">
            <div class="form-group">
              <label>
                <i class="fas fa-calendar-check"></i> Credit Due Date
              </label>
              <input type="date" name="credit_due_date" />
            </div>
            <div class="form-group">
              <label>
                <i class="fas fa-credit-card"></i> Unit Of Measure
                <span class="required">*</span>
              </label>
              <select name="unit" required>
                <option value="">-- Select unit of measure --</option>
                <option value="pcs">pieces</option>
                <option value="bags">Bags</option>
                <option value="kg">Kilograms</option>
              </select>
            </div>
          </div>
          
          <button type="submit" class="btn-save">
            <i class="fas fa-save"></i> Save Stock
          </button>
        </form>

        <div class="back-link">
          <a href="{% url 'stock_list' %}">
            <i class="fas fa-arrow-left"></i> Back to Stock List
          </a>
        </div>
      </div>
    </div>
  </body>
</html>

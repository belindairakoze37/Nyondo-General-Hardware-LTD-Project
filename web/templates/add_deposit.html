{% extends 'base.html' %}
{% load static %}

{% block title %}
     Add Deposit
{% endblock %}

{% block sidebar %}{% endblock %}


{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/add_deposit.css' %}">
{% endblock %}

{% block content %}
    

<div class="container mt-5">
    <div class="card card-box">
        <div class="header">
            <h4 class="mb-0">Record New Deposit</h4>
        </div>
        <div class="form-section">
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Customer</label>
                        <select name="customer_name" class="form-control" required>
                            <option value="">-- Select Customer --</option>
                            {% for customer in customers %}
                                <option value="{{ customer.id }}">
                                    {{ customer.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
     <!-- Sale -->
                    <div class="col-md-6 mb-3">

                        <label>Sale</label>

                        <select name="sale" class="form-control" required>

                            <option value="">
                                -- Select Sale --
                            </option>

                           {% for sale in sales %}
    <option
        value="{{ sale.id }}"
        {% if deposit.sale.id == sale.id %}selected{% endif %}
    >
        {{ sale.customer.name }} -
        {{ sale.product.product_name }} -
        Balance: {{ sale.balance }}
    </option>
{% endfor %}

                        </select>

                    </div>

                
                    <div class="col-md-6 mb-3">
                        <label>Amount</label>
                        <input type="number" step="0.01" min='1'  name="amount" class="form-control" required>
                    </div>

                    
                    <div class="col-md-6 mb-3">
                        <label>Payment Method</label>
                        <select name="payment_method" class="form-control" required>
                            <option value="">-- Select Method --</option>
                            <option value="cash">Cash</option>
                            <option value="mobile_money">Mobile Money</option>
                            <option value="bank_transfer">Bank Transfer</option>
                        </select>
                    </div>

                   

                <div class="d-flex justify-content-between">

                    <a href="{% url 'deposit_list' %}" class="btn btn-secondary">
                        Cancel
                    </a>

                    <button type="submit" class="btn btn-success">
                        Save Deposit
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
{% endblock %}

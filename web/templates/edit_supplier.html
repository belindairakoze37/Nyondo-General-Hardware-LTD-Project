<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONDO Hardware - Edit Supplier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Container */
        .container {
            max-width: 900px;
            width: 50%;
            margin: 0 auto;
        }

        /* Card */
        .edit-card {
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .edit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        /* Header */
        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .card-header h2 i {
            color: #ff8c00;
            font-size: 28px;
        }

        .card-header p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        /* Form Styles - 2 COLUMNS */
        .supplier-form {
            display: flex;
            flex-direction: column;
        }

        /* Two Column Grid - Balanced layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        /* Full width fields */
        .full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a2e;
            font-size: 14px;
        }

        .form-group label i {
            color: #ff8c00;
            width: 18px;
        }

        .required {
            color: #f44336;
            font-size: 12px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff8c00;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Button Group - Side by Side */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-update {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 12px;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
        }

        .btn-delete {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b6b, #dc3545);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }

        /* Messages */
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .success-message {
            background: #d1fae5;
            color: #059669;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #059669;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e5e7eb;
        }

        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }

        .back-link a {
            text-decoration: none;
            color: #ff8c00;
            font-weight: 500;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            gap: 12px;
            color: #e67e22;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                max-width: 550px;
            }
            
            .edit-card {
                padding: 25px;
            }
            
            .card-header h2 {
                font-size: 24px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .full-width {
                grid-column: span 1;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="edit-card">
        <div class="card-header">
            <h2>
                <i class="fas fa-truck"></i> Edit Supplier
            </h2>
            <p><i class="fas fa-pen"></i> Update supplier information</p>
        </div>

        {% if error_message %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            {{ error_message }}
        </div>
        {% endif %}

        {% if success_message %}
        <div class="success-message">
            <i class="fas fa-check-circle"></i>
            {{ success_message }}
        </div>
        {% endif %}

        <form method="POST" class="supplier-form" action="{% url 'edit_supplier' supplier.id %}">
            {% csrf_token %}

            <!-- 2 COLUMN GRID - Fields distributed between columns -->
            <div class="form-grid">
                <!-- COLUMN 1 -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-building"></i> Supplier Name <span class="required">*</span>
                    </label>
                    <input type="text" name="name" value="{{ supplier.name|default:'' }}" placeholder="Enter supplier name" required>
                </div>

                <!-- COLUMN 2 -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope"></i> Email Address <span class="required">*</span>
                    </label>
                    <input type="email" name="email" value="{{ supplier.email|default:'' }}" placeholder="supplier@example.com" required>
                </div>

                <!-- COLUMN 1 -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-phone-alt"></i> Contact Number <span class="required">*</span>
                    </label>
                    <input type="tel" maxlength="14" name="contact" value="{{ supplier.contact|default:'' }}" placeholder="+1234567890" required>
                </div>

                <!-- COLUMN 2 - Empty for balance (or you can add another field here) -->
                <div class="form-group">
                    <!-- This space is intentionally left empty to maintain column balance -->
                </div>

                <!-- Address - Full width (spans both columns) -->
                <div class="form-group full-width">
                    <label>
                        <i class="fas fa-map-marker-alt"></i> Address <span class="required">*</span>
                    </label>
                    <textarea name="address" placeholder="Enter full address" required>{{ supplier.address|default:'' }}</textarea>
                </div>
            </div>

            <hr>

            <!-- Action Buttons Side by Side -->
            <div class="button-group">
                <button type="submit" class="btn-update">
                    <i class="fas fa-save"></i> Update Supplier
                </button>
                
                <button type="button" class="btn-delete" onclick="if(confirm('Are you sure you want to delete this supplier? This action cannot be undone.')) { document.getElementById('deleteForm').submit(); }">
                    <i class="fas fa-trash-alt"></i> Delete Supplier
                </button>
            </div>
        </form>

        <!-- Separate form for delete to avoid nested forms -->
        <form method="POST" id="deleteForm" action="{% url 'delete_supplier' supplier.id %}" style="display: none;">
            {% csrf_token %}
        </form>

        <div class="back-link">
            <a href="{% url 'supplier_list' %}">
                <i class="fas fa-arrow-left"></i> Back to Suppliers
            </a>
        </div>
    </div>
</div>

</body>
</html>

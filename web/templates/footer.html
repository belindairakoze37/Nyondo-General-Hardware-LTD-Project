<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONDO Hardware - Footer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Main content to push footer down */
        .main-content {
            flex: 1;
            padding: 40px;
            text-align: center;
        }

        /* ========== FOOTER STYLES ========== */
        .footer {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 30px 50px;
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Left Section */
        .footer-left h4 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .footer-left p {
            font-size: 13px;
            color: #ccc;
        }

        /* Center Section */
        .footer-center p {
            font-size: 13px;
            color: #888;
        }

        /* Right Section - Social Icons */
        .footer-right {
            display: flex;
            gap: 15px;
        }

        .footer-right a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .footer-right a:hover {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            transform: translateY(-3px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .footer {
                padding: 25px 20px;
            }

            .footer-content {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .footer-left h4 {
                font-size: 18px;
            }

            .footer-left p {
                font-size: 12px;
            }

            .footer-center p {
                font-size: 12px;
            }

            .footer-right {
                justify-content: center;
            }
        }
    </style>
</head>
<body>


<footer class="footer">
    <div class="footer-content">
        <div class="footer-left">
            <h4>NYONDO Hardware</h4>
            <p>Smart Inventory & Stock Management System</p>
        </div>

        <div class="footer-center">
            <p>&copy; 2026 NYONDO Hardware. All Rights Reserved.</p>
        </div>

        <div class="footer-right">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
    </div>
</footer>

</body>
</html>

{% extends 'base.html' %}
{% load static %}

{% block title %}
    Add Supplier Credit
{% endblock %}

{% block navs %}{% endblock %}

{% block sidenav %}{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/add_supplier_credit.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <div class="card">

        <h2>Add Supplier Credit</h2>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Supplier</label>

                <select name="supplier" required>

                    <option value="">
                        Select Supplier
                    </option>

                    {% for supplier in suppliers %}

                    <option value="{{ supplier.id }}">
                        {{ supplier.name }}
                    </option>

                    {% endfor %}

                </select>
            </div>

            <div class="form-group">
                <label>Stock/Product</label>

                <select name="stock" required>

                    <option value="">
                        Select Product
                    </option>

                    {% for stock in stocks %}

                    <option value="{{ stock.id }}">
                        {{ stock.product_name }}
                    </option>

                    {% endfor %}

                </select>
            </div>

            <div class="form-group">
                <label>Amount Owed</label>

                <input
                    type="number"
                    step="0.01"
                    name="amount_owed"
                    required
                >
            </div>

            <div class="form-group">
                <label>Amount Paid</label>

                <input
                    type="number"
                    step="0.01"
                    name="amount_paid"
                    value="0"
                >
            </div>

            <div class="form-group">
                <label>Due Date</label>

                <input
                    type="date"
                    name="due_date"
                    required
                >
            </div>

            <button type="submit">
                Save Supplier Credit
            </button>

        </form>

    </div>

</div>

{% endblock %}

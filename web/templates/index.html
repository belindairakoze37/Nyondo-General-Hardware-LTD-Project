<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nyondo Hardware Management System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter', sans-serif;
    }

    body{
      background:#f0f2f8;
      color:#0f172a;
    }


    .hero{
      min-height:100vh;
      background:linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
      overflow:hidden;
    }

    .overlay{
      display:none;
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:850px;
      text-align:center;
      color:white;
    }

    .system-badge{
      display:inline-block;
      background:rgba(249,115,22,0.15);
      backdrop-filter:blur(5px);
      color:#f97316;
      padding:12px 22px;
      border-radius:30px;
      margin-bottom:25px;
      font-size:14px;
      font-weight:600;
      border:1px solid rgba(249,115,22,0.3);
    }

    .hero-content h1{
      font-size:68px;
      line-height:1.1;
      margin-bottom:25px;
      font-weight:800;
      background:linear-gradient(135deg, #FFFFFF, #cbd5e1);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .hero-content p{
      font-size:20px;
      line-height:1.9;
      color:#cbd5e1;
      margin-bottom:40px;
    }

    .login-btn{
      display:inline-block;
      padding:18px 40px;
      background:#f97316;
      color:white;
      text-decoration:none;
      border-radius:14px;
      font-size:17px;
      font-weight:700;
      transition:0.3s;
      box-shadow:0 10px 25px rgba(249,115,22,0.35);
    }

    .login-btn:hover{
      transform:translateY(-4px);
      background:#ea580c;
    }

    
    .section-title{
      text-align:center;
      margin-bottom:50px;
    }

    .section-title h2{
      font-size:42px;
      margin-bottom:15px;
      color:#0f172a;
    }

    .section-title p{
      color:#64748b;
      font-size:17px;
    }

    @media(max-width:900px){

      .hero{
        flex-direction:column;
        text-align:center;
      }

      .hero-content h1{
        font-size:42px;
      }

      .section-title h2{
        font-size:34px;
      }
    }

  </style>
</head>
<body>
  <!-- hero section -->
  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">

      <div class="system-badge">
        NYONDO GENERAL HARDWARE SYSTEM
      </div>

      <h1>
        Smart Hardware Management  System
      </h1>

      <p>
        Manage stock, sales, suppliers, transport fees, customer credit,
        payments, and business reports efficiently using one centralized
        hardware management system.
      </p>

      <a href="{% url 'login' %}" class="login-btn">
        Login to System
      </a>

    </div>

  </section>

</body>
</html>

{% extends 'base.html' %}
{% load humanize %}
{% load static %}

{% block title %}
    Edit Deposit
{% endblock %}

{% block sidebar %}{% endblock %}

{% block sidenav %}{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/edit_deposit.css' %}">
{% endblock %}

{% block content %}

<div class="main-content ">

    <div class="card shadow p-4">
        <h2 class="mb-4">Edit Deposit</h2>

        <form method="POST">
            {% csrf_token %}

            
            <div class="mb-3">
                <label class="form-label">Customer</label>

                <select name="customer_name" class="form-select">
                    {% for customer in customers %}
                        <option value="{{ customer.id }}"
                            {% if customer.id == deposit.customer_name.id %}
                                selected
                            {% endif %}
                        >
                            {{ customer }}
                        </option>
                    {% endfor %}
                </select>
            </div>


             <!-- Sale -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">Sale</label>

                        <select
                            name="sale"
                            class="form-control"
                            required
                        >

                           {% for sale in sales %}
    <option
        value="{{ sale.id }}"
        {% if deposit.sale.id == sale.id %}selected{% endif %}
    >
        {{ sale.customer.name }} -
        {{ sale.product.product_name }} -
        Balance: {{ sale.balance |intcomma }}
    </option>
{% endfor %}
                        </select>

                    </div>

            
            <div class="mb-3">
                <label class="form-label">Amount</label>

                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    value="{{ deposit.amount  }}"
                    class="form-control"
                >
            </div>

            
            <div class="mb-3">
                <label class="form-label">Payment Method</label>

                 <select name="payment_method" class="form-control" required>
                            <option value="cash" {% if deposit.payment_method == 'cash' %}selected{% endif %}>Cash</option>
                            <option value="mobile_money" {% if deposit.payment_method == 'mobile_money' %}selected{% endif %}>Mobile Money</option>
                            <option value="bank_transfer" {% if deposit.payment_method == 'bank_transfer' %}selected{% endif %}>Bank Transfer</option>
                        </select>
            </div>

            <button type="submit" class="btn btn-primary">
                Update Deposit
            </button>

        </form>
    </div>

</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Deposit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        
        body {
            background-color: #f0f2f5;
        }

        .card {
            border-radius: 12px;
            border: none;
            margin: auto;
            width: 50%;
        }

        h2 {
            color: #0a3622;
            font-weight: 600;
            border-left: 4px solid #198754;
            padding-left: 15px;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #ced4da;
            padding: 8px 12px;
        }

        .form-control:focus, .form-select:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.15);
        }

        .btn-primary {
            background-color: #198754;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: #0a5c36;
        }

        .shadow {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075) ;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="mb-4">Edit Deposit</h2>

        <form method="POST">
            {% csrf_token %}

            
            <div class="mb-3">
                <label class="form-label">Customer</label>

                <select name="customer_name" class="form-select">
                    {% for customer in customers %}
                        <option value="{{ customer.id }}"
                            {% if customer.id == deposit.customer_name.id %}
                                selected
                            {% endif %}
                        >
                            {{ customer }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            
            <div class="mb-3">
                <label class="form-label">Amount</label>

                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    value="{{ deposit.amount }}"
                    class="form-control"
                >
            </div>

            
            <div class="mb-3">
                <label class="form-label">Payment Method</label>

                 <select name="method" class="form-control" required>
                            <option value="cash" {% if deposit.method == 'cash' %}selected{% endif %}>Cash</option>
                            <option value="mobile_money" {% if deposit.method == 'mobile_money' %}selected{% endif %}>Mobile Money</option>
                            <option value="bank_transfer" {% if deposit.method == 'bank_transfer' %}selected{% endif %}>Bank Transfer</option>
                        </select>
            </div>

            <button type="submit" class="btn btn-primary">
                Update Deposit
            </button>

        </form>
    </div>

</div>

</body>
</html>

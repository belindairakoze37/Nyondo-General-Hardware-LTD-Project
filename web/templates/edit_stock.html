<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYONDO Hardware - Edit Stock</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #f0f2f5;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* Container */
      .container {
        max-width: 800px;
        width: 50%;
        margin: 0 auto;
      }

      /* Card */
      .edit-card {
        background: white;
        border-radius: 24px;
        padding: 35px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        transition: transform 0.3s ease;
      }

      .edit-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
      }

      /* Header */
      .card-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .card-header h2 {
        font-size: 28px;
        font-weight: 700;
        color: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .card-header h2 i {
        color: #ff8c00;
        font-size: 28px;
      }

      .card-header p {
        color: #666;
        font-size: 14px;
        margin-top: 8px;
      }

      /* Form Styles */
      .stock-form {
        display: flex;
        flex-direction: column;
      }

      /* Two Column Grid */
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #1a1a2e;
        font-size: 14px;
      }

      .form-group label i {
        color: #ff8c00;
        width: 18px;
      }

      .required {
        color: #f44336;
        font-size: 12px;
      }

      .form-group input , select{
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        transition: all 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #ff8c00;
        box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
      }

      .form-group input[readonly] {
        background: #f8f9fa;
        cursor: not-allowed;
      }

      /* Checkbox Group Styles */
      .checkbox-group {
        flex-direction: row;
        align-items: center;
        gap: 12px;
      }

      .checkbox-group label {
        margin-bottom: 0;
        cursor: pointer;
      }

      .checkbox-group input[type="checkbox"] {
        width: auto;
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #ff8c00;
        margin: 0;
      }

      /* Button */
      .btn-update {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #ffd700, #ff8c00);
        border: none;
        border-radius: 12px;
        color: #1a1a2e;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-family: "Inter", sans-serif;
        margin-top: 10px;
      }

      .btn-update:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
      }

      /* Back Link */
      .back-link {
        text-align: center;
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #e5e7eb;
      }

      .back-link a {
        text-decoration: none;
        color: #ff8c00;
        font-weight: 500;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s;
      }

      .back-link a:hover {
        gap: 12px;
        color: #e67e22;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .container {
          max-width: 550px;
        }

        .edit-card {
          padding: 25px;
        }

        .card-header h2 {
          font-size: 24px;
        }

        .form-row {
          grid-template-columns: 1fr;
          gap: 0;
        }

        .checkbox-group {
          flex-direction: row;
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="edit-card">
        <div class="card-header">
          <h2><i class="fas fa-edit"></i> Edit Stock</h2>
          <p><i class="fas fa-pen"></i> Update product information</p>
        </div>

        <form
          method="POST"
          class="stock-form"
          action="{% url 'edit_stock' stock.id %}"
        >
          {% csrf_token %}

          <!-- Row 1: Product Name + Quantity -->
          <div class="form-row">
            <div class="form-group">
              <label> <i class="fas fa-tag"></i> Product Name </label>
              <input
                type="text"
                name="product_name"
                value="{{ stock.product_name }}"
                placeholder="Enter product name"
                required
              />
            </div>

            <div class="form-group">
              <label> <i class="fas fa-cubes"></i> Quantity </label>
              <input
                type="number"
                name="quantity"
                value="{{ stock.quantity }}"
                placeholder="0"
                min="0"
                required
              />
            </div>
          </div>

          <!-- Row 2: Unit Cost + Selling Price -->
          <div class="form-row">
            <div class="form-group">
              <label>
                <i class="fas fa-dollar-sign"></i> Unit Cost (UGX)
              </label>
              <input
                type="number"
                name="unit_cost"
                value="{{ stock.unit_cost }}"
                placeholder="Cost from supplier"
                step="0.01"
                required
              />
            </div>

            <div class="form-group">
              <label> <i class="fas fa-tag"></i> Selling Price (UGX) </label>
              <input
                type="number"
                name="selling_price"
                value="{{ stock.selling_price }}"
                placeholder="Price to customers"
                step="0.01"
                required
              />
            </div>
          </div>

          <!-- Row 3: Category + Payment Method -->
          <div class="form-row">
            <div class="form-group">
              <label> <i class="fas fa-th-large"></i> Category </label>
              <input
                type="text"
                name="category"
                value="{{ stock.category }}"
                required
              />
            </div>

            <div class="form-group">
              <label> <i class="fas fa-credit-card"></i> Payment Method </label>
              <input
                type="text"
                name="payment_method"
                value="{{ stock.payment_method }}"
                required
              />
            </div>
          </div>

          <!-- Row 4: Received Date + Credit Due Date -->
          <div class="form-row">
            <div class="form-group">
              <label> <i class="fas fa-calendar"></i> Received Date </label>
              <input
                type="date"
                name="received_date"
                value="{{ stock.received_date|date:'Y-m-d' }}"
                required
              />
            </div>

            <div class="form-group">
              <label>
                <i class="fas fa-calendar-check"></i> Credit Due Date
              </label>
              <input
                type="date"
                name="credit_due_date"
                value="{{ stock.credit_due_date|date:'Y-m-d' }}"
              />
            </div>
          </div>

          <!-- Row 5: Supplier + Unit Of Measure -->
          <div class="form-row">
            <div class="form-group">
              <label> <i class="fas fa-building"></i> Supplier </label>
              <select name="supplier" required>
                <option value="">-- Select Supplier --</option>
                {% for supplier in suppliers %}
                <option
                  value="{{ supplier.id }}"
                  {% if stock.supplier.id == supplier.id %}selected{% endif %}
                >
                  {{ supplier.name }}
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="form-group">
              <label>
                <i class="fas fa-credit-card"></i> Unit Of Measure
                <span class="required">*</span>
              </label>
              <select name="unit" required >
                <option value="">-- Select unit of measure --</option>
                <option value="pcs" {% if stock.unit == 'pcs' %}selected{% endif %}>pieces</option>
                <option value="bags" {% if stock.unit == 'bags' %}selected{% endif %}>Bags</option>
                <option value="kg" {% if stock.unit == 'kg' %}selected{% endif %}>Kilograms</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group checkbox-group">
              <input 
                type="checkbox" 
                name="is_paid" 
                id="is_paid" 
                {% if stock.is_paid %}checked{% endif %}
              />
              <label for="is_paid">
                <i class="fas fa-check-circle"></i> Is Paid
              </label>
              <small style="margin-left: 8px; color: #666; font-size: 12px;">
                (Check if payment has been completed)
              </small>
            </div>
          </div>

          <button type="submit" class="btn-update">
            <i class="fas fa-save"></i> Update Stock
          </button>
        </form>

        <div class="back-link">
          <a href="{% url 'stock_list' %}">
            <i class="fas fa-arrow-left"></i> Back to Stock List
          </a>
        </div>
      </div>
    </div>
  </body>
</html>

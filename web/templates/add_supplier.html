{% extends 'base.html' %}
{% load static %}

{% block title %}
    Add Supplier
{% endblock %}

{% block navs %}{% endblock %}

{% block sidenav %}{% endblock %}



{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/add_supplier.css' %}">
{% endblock %}

{% block content %}
    





<div class="container">

    <div class="header">
        <h2>Add New Supplier</h2>
    </div>

    <div class="form-card">
       
        <form method="POST" action="{% url 'add_supplier' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="name">Supplier Name *</label>
                <input type="text" id="name" name="name" required placeholder="Enter supplier name" value="{{ form_data.name|default:'' }}">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="supplier@example.com" value="{{ form_data.email|default:'' }}">
                </div>

                <div class="form-group">
                    <label for="contact">Contact Number *</label>
                    <input type="tel"  maxlength="14" id="contact" name="contact" required placeholder="+2564567890" value="{{ form_data.contact|default:'' }}">
                </div>
            </div>

            <div class="form-group">
                <label for="address">Address *</label>
                <textarea id="address" name="address" required placeholder="Enter full address">{{ form_data.address|default:'' }}</textarea>
            </div>

            <hr>

            <button type="submit" class="btn-submit">+ Add Supplier</button>
        </form>
    </div>

</div>
{% endblock %}
